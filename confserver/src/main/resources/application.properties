#eureka registration
spring.application.name=config-server
server.port=8888
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.server.wait-time-in-ms-when-sync-empty=5
#eureka.client.register-with-eureka=true
spring.profiles.active=native
#spring.cloud.config.server.native.searchLocations=file://${user.home}
spring.cloud.config.server.native.searchLocations=./src/main/resources
#spring.cloud.config.server.git.uri=https://github.com/Mariem-Chebbi/config-server
#management.endpoints.web.exposure.include=*
welcome.messageGlobal= Welcome to spring cloud config-server,This is global config


spring.cloud.config.server.native.search-locations= classpath:/configurations


